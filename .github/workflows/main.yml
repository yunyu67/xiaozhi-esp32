# 准备内容（注意：是单引号，不解析变量）
$content = @'
name: Build ESP32-S3 1.28-box Music Firmware

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.4
          target: esp32s3

      - run: |
          cp -f sdkconfig.defaults sdkconfig
          idf.py set-target esp32s3
          idf.py build

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-1.28-box
          path: |
            build/*.bin
            build/flash_args
          if-no-files-found: error
'@

# Base64 编码后通过 JSON 传递，避免中文/特殊字符问题
$bytes = [System.Text.Encoding]::UTF8.GetBytes($content)
$b64 = [Convert]::ToBase64String($bytes)
$body = @{message="Add build workflow"; content=$b64} | ConvertTo-Json

# 用你之前用过的 PAT 推送
$headers = @{
    Authorization = "token …_PAT"
    "User-Agent" = "PowerShell"
    Accept = "application/vnd.github+json"
}

# 需要把 "你的GitHub_PAT" 替换成你 fork 时用的 token
Invoke-RestMethod -Uri "https://api.github.com/repos/yunyu67/xiaozhi-esp32/contents/.github/workflows/build.yml" `
    -Method Put -Headers $headers -Body $body
